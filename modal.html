<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Job Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <header>
        <div class="navbar">
            <a href="index.html" id="nav-logo"><i class="fa-solid fa-user-tie"></i>Job-Tracker</a>
        </div>
    </header>

    <!-- Modal Overlay -->
    <div class="auth-overlay" id="auth-overlay">
        <div class="auth-modal">
            <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>

            <!-- Tabs -->
            <div class="auth-tabs">
                <button class="tab-btn active" id="login-tab">Login</button>
                <button class="tab-btn" id="signup-tab">Sign Up</button>
            </div>

            <!-- Login Form -->
            <div class="auth-form active" id="login-form">
                <h2>Welcome Back</h2>
                <p>Login to your Job-Tracker account</p>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <i class="fa-solid fa-eye toggle-pass" id="toggle-login-pass"></i>
                </div>

                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>

                <button class="auth-btn" id="login-btn">Login</button>
                <p class="switch-text">Don't have an account? <span id="go-signup">Sign Up</span></p>
            </div>

            <!-- Sign Up Form -->
            <div class="auth-form" id="signup-form">
                <h2>Create Account</h2>
                <p>Join Job-Tracker today</p>

                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Full name" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="Email address" required>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <i class="fa-solid fa-eye toggle-pass" id="toggle-signup-pass"></i>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-confirm" placeholder="Confirm password" required>
                </div>

                <button class="auth-btn" id="signup-btn">Create Account</button>
                <p class="switch-text">Already have an account? <span id="go-login">Login</span></p>
            </div>

            <div class="auth-message" id="auth-message"></div>
        </div>
    </div>

    <script src="toggle.js"></script>
    <script src="auth.js"></script>
</body>
</html>
