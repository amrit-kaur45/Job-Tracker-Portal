    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const urlParam = new URLSearchParams(window.location.search);
            const index = urlParam.get("id");
            const selectJob = jobCategory[index];

            const jobDetailsContainer = document.getElementById("jobDetails");
            jobDetailsContainer.innerHTML = `

            <div class="job-header">
            <div class="job-img-row">
                <img src="${selectJob.image}" alt="image">
                <div>
                    <h2>${selectJob.company}</h2>
                    <span>${selectJob.location}</span>
                </div>
            </div>
            <button href="#">Apply now</button>
        </div>

        <div class="features">
        <div class="fe-box">
            <div class="fe-box-in">
                <img src="vacancy.png" alt="vacancy-image">
                <h3>Vacancy</h3>
                <p>${selectJob.vacancy}</p>
            </div>
            <div class="fe-box-in">
                <img src="fe 1.png" alt="position-image">
                <h3>Position</h3>
                <p>${selectJob.title}</p>
            </div>
            <div class="fe-box-in">
                <img src="hour.png" alt="hour-image">
                <h3>Hours</h3>
                <p>${selectJob.hours}</p>
            </div>
            <div class="fe-box-in">
                <img src="salary.png" alt="salary-image">
                <h3>Salary</h3>
                <p>${selectJob.rate}</p>
            </div>
        </div>
    </div>
    <div class="job-description">
        <h3>Job Description</h3>
        <p>${selectJob.description}</p>
        
        <h3>Employment Status</h3>
        <p>- ${selectJob.av}</p>

        <h3>Workplace</h3>
