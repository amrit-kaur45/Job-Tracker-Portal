<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job - Job Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
</head>
<body class="addJob-body">

    <header>
        <div class="navbar">
            <a href="index.html" id="nav-logo"><i class="fa-solid fa-user-tie"></i>Job-Tracker</a>
            <ul id="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="add-job.html">Add Job</a></li>
                <li><a href="job.html">Browse Jobs</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><button id="join-btn">Join</button></li>
                <li id="right-icons-mobile">
                    <i class="fa-solid fa-user"></i>
                    <i class="fa-solid fa-gear"></i>
                </li>
            </ul>
            <div id="right-icons">
                <i class="fa-solid fa-user"></i>
                <i class="fa-solid fa-gear"></i>
            </div>
            <i id="bar-icon" class="fa-solid fa-bars"></i>
        </div>
    </header>

    <h2 class="page-title">Add New Job</h2>

    <form id="jobForm" class="job-form">

        <div class="form-group">
            <label for="company">Company Name</label>
            <input type="text" id="company" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="title">Job Title</label>
            <input type="text" id="title" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" class="form-input" required>
        </div>

        <div class="form-group">
            <label for="rate">Salary / Rate</label>
            <input type="text" id="rate" class="form-input" placeholder="e.g. $900 - $1200/m" required>
        </div>

        <div class="form-group">
            <label for="hours">Working Hours</label>
            <input type="text" id="hours" class="form-input" placeholder="e.g. 9am - 5pm">
        </div>

        <div class="form-group">
            <label for="vacancy">Vacancies</label>
            <input type="number" id="vacancy" class="form-input" placeholder="e.g. 3" min="1">
        </div>

        <div class="form-group">
            <label for="type">Job Type</label>
            <select id="type" class="form-input">
                <option>Full Time</option>
                <option>Part Time</option>
                <option>Freelancer</option>
                <option>Internship</option>
                <option>Remote</option>
            </select>
        </div>

        <div class="form-group">
            <label for="workplace">Workplace</label>
            <select id="workplace" class="form-input">
                <option>On-site</option>
                <option>Remote</option>
                <option>Hybrid</option>
            </select>
        </div>

        <div class="form-group">
            <label for="education">Education Required</label>
            <input type="text" id="education" class="form-input" placeholder="e.g. Bachelor's Degree">
        </div>

        <div class="form-group">
            <label for="experience">Experience Required</label>
            <input type="text" id="experience" class="form-input" placeholder="e.g. 2+ years">
        </div>

        <div class="form-group">
            <label for="description">Job Description</label>
            <textarea id="description" class="form-input" rows="4" required></textarea>
        </div>

        <button type="submit" class="submit-btn">Add Job</button>
        <p id="job-msg" style="text-align:center; margin-top:12px; font-size:14px; font-weight:500;"></p>

    </form>

    <!-- Auth Modal -->
    <div class="auth-overlay hidden" id="auth-overlay">
        <div class="auth-modal">
            <button class="close-btn" id="close-modal"><i class="fa-solid fa-xmark"></i></button>
            <div class="auth-tabs">
                <button class="tab-btn active" id="login-tab">Login</button>
                <button class="tab-btn" id="signup-tab">Sign Up</button>
            </div>
            <div class="auth-form active" id="login-form">
                <h2>Welcome Back</h2>
                <p>Login to your Job-Tracker account</p>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="login-email" placeholder="Email address">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Password">
                    <i class="fa-solid fa-eye toggle-pass" id="toggle-login-pass"></i>
                </div>
                <div class="form-options">
                    <label><input type="checkbox"> Remember me</label>
                    <a href="#">Forgot password?</a>
                </div>
                <button class="auth-btn" id="login-btn">Login</button>
                <p class="switch-text">Don't have an account? <span id="go-signup">Sign Up</span></p>
            </div>
            <div class="auth-form" id="signup-form">
                <h2>Create Account</h2>
                <p>Join Job-Tracker today</p>
                <div class="input-group">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="signup-name" placeholder="Full name">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="signup-email" placeholder="Email address">
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-password" placeholder="Password">
                    <i class="fa-solid fa-eye toggle-pass" id="toggle-signup-pass"></i>
                </div>
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="signup-confirm" placeholder="Confirm password">
                </div>
                <button class="auth-btn" id="signup-btn">Create Account</button>
                <p class="switch-text">Already have an account? <span id="go-login">Login</span></p>
            </div>
            <div class="auth-message" id="auth-message"></div>
        </div>
    </div>

    <script src="toggle.js"></script>
    <script src="auth.js"></script>
    <script>
        document.getElementById('jobForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const msg = document.getElementById('job-msg');

            const jobData = {
                company:     document.getElementById('company').value.trim(),
                title:       document.getElementById('title').value.trim(),
                location:    document.getElementById('location').value.trim(),
                rate:        document.getElementById('rate').value.trim(),
                hours:       document.getElementById('hours').value.trim(),
                vacancy:     document.getElementById('vacancy').value.trim(),
                type:        document.getElementById('type').value,
                workplace:   document.getElementById('workplace').value,
                education:   document.getElementById('education').value.trim(),
                experience:  document.getElementById('experience').value.trim(),
                description: document.getElementById('description').value.trim()
            };

            if (!jobData.company || !jobData.title || !jobData.location || !jobData.description) {
                msg.textContent = 'Please fill in all required fields.';
                msg.style.color = 'red';
                return;
            }

            msg.textContent = 'Adding job...';
            msg.style.color = '#888';

            try {
                const res = await fetch('/Job-Tracker-Portal/api/add-job.php', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(jobData)
});
                const data = await res.json();

                if (data.success) {
                    msg.textContent = '✅ Job added successfully!';
                    msg.style.color = 'green';
                    document.getElementById('jobForm').reset();
                } else {
                    msg.textContent = '❌ ' + data.error;
                    msg.style.color = 'red';
                }
            } catch (err) {
                msg.textContent = '❌ Server error. Please try again.';
                msg.style.color = 'red';
            }
        });
    </script>

</body>
</html>
